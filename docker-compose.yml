services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: hrtech-api:latest
    # OPENAI_API_KEY etc. are picked up from apps/api/.env if present;
    # the structural overrides below always win.
    env_file:
      - path: apps/api/.env
        required: false
    environment:
      NODE_ENV: production
      PORT: "3001"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    expose:
      - "3001"
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3001/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: hrtech-web:latest
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
