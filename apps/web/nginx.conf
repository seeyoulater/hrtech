server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip text assets
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;
  gzip_min_length 256;

  # Hashed asset bundles — long, immutable cache
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Fonts — long cache, CORS-friendly
  location /fonts/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Access-Control-Allow-Origin "*";
    try_files $uri =404;
  }

  # Static brand assets at root (favicon, logo mark) — cache for a
  # day so reloads don't flash an empty <img> while the file refetches.
  location ~* \.(svg|png|ico|webp)$ {
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  # SPA fallback — let React Router handle unknown paths
  location / {
    try_files $uri $uri/ /index.html;
  }
}
